services:
  pgAdmin:
    image: dpage/pgadmin4:latest
    hostname: pgAdmin4
    container_name: pgAdmin4
    restart: unless-stopped
    volumes:
      - /opt/pgadmin:/var/lib/pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: developers@greet.codes
      PGADMIN_DEFAULT_PASSWORD: Greet@8866
      PGADMIN_LISTEN_PORT: 5050

    networks:
      devNetwork:
        ipv4_address: 172.20.0.11

networks:
  devNetwork:
    external: true

