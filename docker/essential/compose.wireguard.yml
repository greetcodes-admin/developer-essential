services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

    environment:
      - INSECURE=true
      - HOST=0.0.0.0
      - PORT=51821
      - DISABLE_IPV6=true

    volumes:
      - /opt/wireguard:/etc/wireguard

    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"

    networks:
      devNetwork:
        ipv4_address: 172.20.0.2

networks:
  devNetwork:
    external: true
    
# docker compose -p essential -f compose.wireguard.yml up -d --build  

# POSTUP : iptables -A FORWARD -i wg0 -o {{device}} -j ACCEPT; iptables -A FORWARD -i {{device}} -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -s {{ipv4Cidr}} -d 172.20.0.0/16 -j MASQUERADE
# POSTDOWN : iptables -D FORWARD -i wg0 -o {{device}} -j ACCEPT; iptables -D FORWARD -i {{device}} -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -s {{ipv4Cidr}} -d 172.20.0.0/16 -j MASQUERADE