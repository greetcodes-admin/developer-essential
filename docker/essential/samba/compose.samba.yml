services:
  samba:
    image: dockurr/samba:latest
    container_name: samba
    restart: always

    ports:
      - "445:445/tcp"

    volumes:
      - /devDisk:/devDisk
      - /userDisk:/userDisk
      - /opt/samba/users.conf:/etc/samba/users.conf
      - /opt/samba/smb.conf:/etc/samba/smb.conf

    networks:
      lan_net:
        ipv4_address: 192.168.200.5

networks:
  lan_net:
    external: true
    
