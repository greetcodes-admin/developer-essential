---
services:
  codex:
    container_name: codex
    hostname: codex
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - /devDisk:/workspace
      - /opt/codex:/opt/.codex

    working_dir: /workspace

    environment:
      - CODEX_HOME=/opt/.codex

    # Root user is used on the host/base OS, so no UID/GID mapping is needed.
    # Keep Codex writable without granting broad container privileges.
    security_opt:
      - seccomp=./codex-seccomp.json
      
    stdin_open: true
    tty: true
    command: sleep infinity
    restart: unless-stopped

    networks:
      devNetwork:
        ipv4_address: 172.20.0.20

networks:
  devNetwork:
    external: true

