version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always

    volumes:
      - /opt/pgadmin/data/:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Greet@8866

    networks:
      lan_net:
        ipv4_address: 192.168.200.6

networks:
  lan_net:
    external: true

