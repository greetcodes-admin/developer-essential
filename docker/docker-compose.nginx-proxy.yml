services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80/tcp'
      - '443:443/tcp'
      - '81:81/tcp'

    networks:
      lan_net:
        ipv4_address: 192.168.200.4

    environment:
      TZ: "Asia/Kolkata"

    volumes:
      - /opt/nginx-proxy/data:/data
      - /opt/nginx-proxy/letsencrypt:/etc/letsencrypt

    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s

networks:
  lan_net:
    external: true