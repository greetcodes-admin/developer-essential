---
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    hostname: filebrowser

    environment:
      - TZ=Asia/Kolkata

    volumes:
      - /opt/filebrowser/database:/database
      - /opt/filebrowser/config:/config
      - /userDisk/:/srv

    user: "0:0"

    ports:
      - "8181:80/tcp" # WebUI
      
    restart: unless-stopped

    networks:
      devNetwork:
        ipv4_address: 172.20.0.240

networks:
  devNetwork:
    external: true

